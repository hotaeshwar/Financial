name: Deploy to GitHub Pages
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Clean npm cache
        run: npm cache clean --force
      
      - name: Remove node_modules and lock file
        run: rm -rf node_modules package-lock.json
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install platform-specific native bindings
        run: npm install --legacy-peer-deps @tailwindcss/oxide-linux-x64-gnu @rollup/rollup-linux-x64-gnu
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: financial.buildingindiadigital.com
